name: CI Cross-Platform Build

on:
  push:
    branches: [ "main", "feature/*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Cache Dependencies
        uses: actions/cache@v3
        with:
          path: |
            build/_deps
            ~/.cache/ccache
          key: ${{ runner.os }}-deps-${{ hashFiles('cmake/dependencies.cmake', 'CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-deps-

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            libx11-dev \
            libgl1-mesa-dev \
            libudev-dev \
            libopenal-dev \
            libvorbis-dev \
            libflac-dev \
            libfreetype-dev \
            xorg-dev \
            libogg-dev \
            xvfb

      - name: Configure CMake
        run: |
          mkdir -p build
          cd build
          cmake ..

      - name: Build
        run: |
          cd build
          make -j$(nproc)

      - name: Run Tests with Virtual Display
        run: |
          cd build
          xvfb-run --auto-servernum ./sfml_game --test-mode

  build-and-test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3

      - name: Cache Dependencies
        uses: actions/cache@v3
        with:
          path: |
            build\_deps
            ~\AppData\Local\ccache
          key: ${{ runner.os }}-deps-${{ hashFiles('cmake/dependencies.cmake', 'CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-deps-

      - name: Install Ninja
        run: |
          choco install ninja -y

      - name: Setup Visual Studio Environment
        uses: microsoft/setup-msbuild@v1.1
        with:
          vs-version: '17.0'

      - name: Install Visual Studio Components
        run: |
          choco install visualstudio2022-workload-nativedesktop -y --package-parameters "--includeOptional --add Microsoft.VisualStudio.Component.VC.Tools.x86.x64"

      - name: Setup CMake
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: "3.25.0"

      - name: Install OpenAL
        shell: powershell
        run: |
          choco install openal -y
          # Wait for installation to complete and verify OpenAL installation
          Start-Sleep -Seconds 5
          $openalPaths = @(
            "C:\Program Files (x86)\OpenAL 1.1 SDK\libs\Win64\OpenAL32.dll",
            "C:\Windows\System32\OpenAL32.dll",
            "C:\Users\runneradmin\AppData\Local\Temp\chocolatey\openal\2.7.0.20170623\Win64\soft_oal.dll"
          )
          $found = $false
          foreach ($path in $openalPaths) {
            if (Test-Path $path) {
              echo "OpenAL DLL found at: $path"
              Copy-Item $path -Destination "C:\Windows\System32\OpenAL32.dll" -Force
              $found = $true
              break
            }
          }
          if (-not $found) {
            echo "OpenAL32.dll not found in any expected location"
            exit 1
          }

      - name: Configure CMake
        shell: cmd
        run: |
          mkdir build
          cd build
          cmake .. -G "Ninja" -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_STANDARD=17

      - name: Build
        shell: cmd
        run: |
          cd build
          ninja -v  # Use verbose output to see detailed build messages

      - name: Setup Virtual Display
        shell: powershell
        run: |
          # Use RDP Session for headless operation
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          # Set display settings
          $env:DISPLAY=":0"

      - name: Run Tests
        shell: cmd
        run: |
          cd build
          copy _deps\sfml-build\lib\*.dll .
          copy _deps\spdlog-build\*.dll .
          copy "C:\Program Files (x86)\OpenAL 1.1 SDK\libs\Win64\OpenAL32.dll" .
          .\sfml_game.exe --test-mode
